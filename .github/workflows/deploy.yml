# 构建 VitePress 并部署到 GitHub Pages
name: Deploy VitePress site to Pages

on:
  # 在推送到 main 分支时运行。如果你的默认分支是 master，请修改下面
  push:
    branches: [main]
  # 允许你在 Actions 标签页手动运行此工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 注意：因为没有 package-lock.json，这里的 cache 可能效果不大，但留着无妨
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        # 【修改点】使用普通 install 代替 ci，不需要锁文件
        run: npm install

      # 【关键】强制清理 VitePress 缓存，解决你遇到的“构建不一致”问题
      - name: Clean VitePress cache
        run: rm -rf .vitepress/cache && rm -rf dist && rm -rf node_modules/.vite

      - name: Build with VitePress
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 【确认】你的构建产物目录
          path: .vitepress/dist

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
