# 构建 VitePress 并部署到 GitHub Pages
name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Clean VitePress cache
        run: rm -rf .vitepress/cache && rm -rf dist && rm -rf node_modules/.vite

      - name: Build with VitePress
        run: npm run docs:build

      # 【调试步骤】构建完了看看当前目录结构到底是什么样的
      - name: List directory structure
        run: ls -la && echo "--- Checking .vitepress directory ---" && ls -la .vitepress || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 【修改点】90% 的情况是在根目录的 dist，先试这个
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
