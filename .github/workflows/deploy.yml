# VitePress 自动部署到 GitHub Pages 工作流
name: Deploy VitePress site to Pages

# 触发条件：推送到 main 分支时执行；也支持手动触发
on:
  push:
    branches: [main] # 若你的默认分支是 master，改为 master
  workflow_dispatch: # 允许在 GitHub 页面手动触发部署

# 权限配置
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # 如需显示 lastUpdated，需完整克隆历史

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v6
        with:
          node-version: 22 # 建议与本地开发版本一致，最低18+
          cache: npm # 若使用 pnpm/yarn/bun，改为对应名称

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 安装依赖
        run: npm ci # 对应 npm；pnpm 改为 pnpm install --frozen-lockfile

      - name: 构建 VitePress 站点
        run: npm run docs:build # 与 package.json 脚本名保持一致

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist # 构建产物目录，不要修改

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build # 等待构建完成后执行
    runs-on: ubuntu-latest
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
